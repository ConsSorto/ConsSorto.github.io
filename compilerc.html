<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsDev Lab - Monaco Edition</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #a78bfa; 
            --text: #f1f5f9;
            --terminal-bg: #000000;
            --green: #4ade80;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            flex-shrink: 0;
        }

        .title-group { display: flex; flex-direction: column; }
        .label { font-size: 9px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .status { font-size: 11px; color: #94a3b8; margin-top: 2px; font-family: monospace; }

        /* Botón de Ejecución: Máxima Nitidez con Icono Play */
        .run-btn {
            background: var(--gradient-btn);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 800;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.4);
            text-transform: uppercase;
            letter-spacing: 1.2px;
            font-size: 13px;
            min-width: 150px;
        }

        .run-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 15px var(--accent-glow);
            background: linear-gradient(135deg, #7c3aed 0%, #5b21b6 100%);
        }

        .run-btn svg {
            flex-shrink: 0;
            filter: none; /* Sin sombras que borren los bordes */
            display: block;
        }

        .run-btn:disabled {
            background: #475569;
            box-shadow: none;
            cursor: not-allowed;
            opacity: 0.7;
        }


        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Contenedor para Monaco */
        #monaco-editor-container {
            flex: 1;
            width: 100%;
            background-color: #1e1e1e;
        }

        .terminal-container {
            height: 180px;
            background-color: var(--terminal-bg);
            border-top: 2px solid #1e293b;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .terminal-header {
            background-color: #111827;
            padding: 6px 15px;
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
        }

        #console {
            flex: 1;
            padding: 10px 15px;
            margin: 0;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            color: var(--green);
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <div class="label">ConsDev Lab C</div>
            <div class="status" id="fileStatus">Cargando motor Monaco...</div>
        </div>
        <button id="runBtn" class="run-btn">
            <span>EJECUTAR</span>
            <!-- Icono Play Sólido Clásico -->
            <svg id="runIcon" width="18" height="18" viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
                <path d="M7 4v16l13-8L7 4z"/>
            </svg>
        </button>
    </div>

    <div class="main-container">
        <!-- Div donde Monaco se renderizará -->
        <div id="monaco-editor-container"></div>
        
        <div class="terminal-container">
            <div class="terminal-header">Consola de Salida</div>
            <pre id="console">Terminal lista.</pre>
        </div>
    </div>

    <!-- Cargador de Monaco Editor -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>

    <script>
        let editor;
        const consoleOut = document.getElementById('console');
        const runBtn = document.getElementById('runBtn');
        const statusLabel = document.getElementById('fileStatus');

        // Configuración de Monaco
        require.config({ paths: { 'vs': 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' }});

        require(['vs/editor/editor.main'], function() {
            editor = monaco.editor.create(document.getElementById('monaco-editor-container'), {
                value: "// Cargando código...",
                language: 'c',
                theme: 'vs-dark',
                automaticLayout: true, // Auto-ajuste de tamaño
                fontSize: 14,
                fontFamily: "'Cascadia Code', 'Consolas', monospace",
                minimap: { enabled: false },
                scrollBeyondLastLine: false,
                lineNumbers: "on",
                roundedSelection: true,
                cursorSmoothCaretAnimation: "on",
                padding: { top: 15 }
            });

            // Una vez cargado Monaco, jalamos el archivo de GitHub
            fetchSource();
        });

        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const sourceFile = params.get('file');

        async function fetchSource() {
            if (!sourceFile) {
                editor.setValue("// Error: No se proporcionó ninguna URL de archivo.\n// Uso: compilerc.html?file=URL_DEL_ARCHIVO_RAW");
                statusLabel.innerText = "⚠️ Falta parámetro 'file'";
                return;
            }

            try {
                const fileName = sourceFile.split('/').pop();
                statusLabel.innerText = "Conectando con: " + fileName;
                
                const response = await fetch(sourceFile + '?t=' + Date.now());
                if (!response.ok) throw new Error();
                
                const text = await response.text();
                editor.setValue(text);
                
                statusLabel.innerText = "● " + fileName + " sincronizado";
                statusLabel.style.color = "#4ade80";
            } catch (error) {
                editor.setValue("// Error al cargar desde GitHub.\n// Revisa la URL Raw y que el repo sea público.");
                statusLabel.innerText = "⚠️ Error de sincronización";
                statusLabel.style.color = "#f87171";
            }
        }

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            consoleOut.innerText = 'Compilando código...';
            consoleOut.style.color = "#94a3b8";

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    body: JSON.stringify({
                        code: editor.getValue(), // Obtenemos el valor de Monaco
                        compiler: 'gcc-head',
                        save: false
                    })
                });

                const data = await response.json();
                
                if (data.program_output) {
                    consoleOut.innerText = data.program_output;
                    consoleOut.style.color = "#4ade80";
                } else if (data.compiler_error) {
                    consoleOut.innerText = "ERROR DE COMPILACIÓN:\n\n" + data.compiler_error;
                    consoleOut.style.color = "#f87171";
                } else {
                    consoleOut.innerText = "Ejecución finalizada.";
                }
            } catch (error) {
                consoleOut.innerText = "Error: El servidor de compilación no responde.";
                consoleOut.style.color = "#f87171";
            } finally {
                runBtn.disabled = false;
            }
        });

        // Ajustar editor al cambiar tamaño de ventana
        window.addEventListener('resize', () => {
            if (editor) editor.layout();
        });
    </script>
</body>
</html>
