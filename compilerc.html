<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsDev Universal Lab v3.0</title>
    <!-- Prism.js para resaltado de sintaxis -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet" />
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #a78bfa; 
            --text: #f1f5f9;
            --terminal-bg: #000000;
            --green: #4ade80;
            --error: #f87171;
            --editor-bg: #1a1b26;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            z-index: 10;
        }

        .title-group { display: flex; flex-direction: column; }
        .label { font-size: 9px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .status { font-size: 11px; color: #94a3b8; margin-top: 2px; font-family: monospace; }

        .run-btn {
            background-color: var(--accent);
            color: #1e1b4b;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .run-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
        .run-btn:disabled { background-color: #475569; cursor: not-allowed; opacity: 0.6; }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* Contenedor del Editor con Resaltado */
        .editor-wrapper {
            flex: 1;
            position: relative;
            background-color: var(--editor-bg);
            overflow: hidden;
        }

        #editor, #highlight-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 20px;
            padding-left: 50px; /* Espacio para números de línea */
            border: none;
            box-sizing: border-box;
            font-family: 'Cascadia Code', 'Consolas', 'Monaco', monospace;
            font-size: 14px;
            line-height: 1.5;
            white-space: pre;
            tab-size: 4;
            overflow: auto;
        }

        #editor {
            color: transparent;
            background: transparent;
            caret-color: white; /* Cursor visible */
            z-index: 2;
            resize: none;
            outline: none;
        }

        #highlight-layer {
            z-index: 1;
            pointer-events: none;
            background-color: var(--editor-bg);
        }

        /* Números de línea */
        .line-numbers-sidebar {
            position: absolute;
            top: 0;
            left: 0;
            width: 40px;
            height: 100%;
            background-color: #16161e;
            border-right: 1px solid #292e42;
            z-index: 3;
            padding-top: 20px;
            text-align: right;
            padding-right: 10px;
            font-family: monospace;
            font-size: 13px;
            color: #444b6a;
            pointer-events: none;
            user-select: none;
        }

        .terminal-container {
            height: 180px;
            background-color: var(--terminal-bg);
            border-top: 2px solid #1e293b;
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .terminal-header {
            background-color: #111827;
            padding: 6px 15px;
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
        }

        #console {
            flex: 1;
            padding: 10px 15px;
            margin: 0;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: var(--green);
            overflow-y: auto;
            white-space: pre-wrap;
        }

        /* Ajustes de Prism para que encaje con el editor */
        code[class*="language-"], pre[class*="language-"] {
            background: none !important;
            padding: 0 !important;
            margin: 0 !important;
            text-shadow: none !important;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <div class="label">ConsDev Lab v3.0</div>
            <div class="status" id="fileStatus">Sincronizando...</div>
        </div>
        <button id="runBtn" class="run-btn">
            <span>EJECUTAR</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>

    <div class="main-container">
        <div class="editor-wrapper">
            <div class="line-numbers-sidebar" id="lineNumbers">1</div>
            <textarea id="editor" spellcheck="false" wrap="off"></textarea>
            <pre id="highlight-layer" aria-hidden="true"><code class="language-c" id="highlight-code"></code></pre>
        </div>
        
        <div class="terminal-container">
            <div class="terminal-header">Consola de Salida</div>
            <pre id="console">Sistema listo.</pre>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/components/prism-c.min.js"></script>

    <script>
        const editor = document.getElementById('editor');
        const highlightCode = document.getElementById('highlight-code');
        const highlightLayer = document.getElementById('highlight-layer');
        const lineNumbers = document.getElementById('lineNumbers');
        const consoleOut = document.getElementById('console');
        const runBtn = document.getElementById('runBtn');
        const statusLabel = document.getElementById('fileStatus');

        // Sincronizar editor y resaltado
        function updateHighlight() {
            let text = editor.value;
            
            // Reemplazar caracteres especiales para HTML
            highlightCode.textContent = text + (text.endsWith('\n') ? ' ' : '');
            Prism.highlightElement(highlightCode);

            // Actualizar números de línea
            const lines = text.split('\n').length;
            let lineNumsHtml = '';
            for (let i = 1; i <= lines; i++) {
                lineNumsHtml += i + '<br>';
            }
            lineNumbers.innerHTML = lineNumsHtml;

            // Sincronizar scroll
            highlightLayer.scrollTop = editor.scrollTop;
            highlightLayer.scrollLeft = editor.scrollLeft;
            lineNumbers.scrollTop = editor.scrollTop;
        }

        editor.addEventListener('input', updateHighlight);
        editor.addEventListener('scroll', updateHighlight);

        // Parámetro de archivo
        const params = new URLSearchParams(window.location.search);
        const sourceFile = params.get('file');

        async function fetchSource() {
            if (!sourceFile) {
                editor.value = "// Uso: compilerc.html?file=URL_RAW_C";
                updateHighlight();
                return;
            }

            try {
                const fileName = sourceFile.split('/').pop();
                statusLabel.innerText = "Cargando: " + fileName;
                
                const response = await fetch(sourceFile + '?t=' + Date.now());
                if (!response.ok) throw new Error();
                
                editor.value = await response.text();
                updateHighlight();
                
                statusLabel.innerText = "● " + fileName + " sincronizado";
                statusLabel.style.color = "#4ade80";
            } catch (error) {
                editor.value = "// Error al cargar desde GitHub.";
                updateHighlight();
                statusLabel.innerText = "⚠️ Error de red";
            }
        }

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            consoleOut.innerText = 'Compilando...';
            consoleOut.style.color = "#94a3b8";

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    body: JSON.stringify({
                        code: editor.value,
                        compiler: 'gcc-head',
                        save: false
                    })
                });

                const data = await response.json();
                consoleOut.innerText = data.program_output || data.compiler_error || "Ejecución finalizada.";
                consoleOut.style.color = data.program_output ? "#4ade80" : "#f87171";
            } catch (error) {
                consoleOut.innerText = "Error del compilador.";
            } finally {
                runBtn.disabled = false;
            }
        });

        // Tabulación (4 espacios)
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = this.selectionStart;
                this.value = this.value.substring(0, s) + "    " + this.value.substring(this.selectionEnd);
                this.selectionEnd = s + 4;
                updateHighlight();
            }
        });

        fetchSource();
    </script>
</body>
</html>
