<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConsDev Universal Lab</title>
    <style>
        :root {
            --bg-dark: #0f172a;
            --panel-bg: #1e293b;
            --accent: #a78bfa; 
            --text: #f1f5f9;
            --terminal-bg: #000000;
            --green: #4ade80;
            --error: #f87171;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text);
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .header {
            background-color: var(--panel-bg);
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
        }

        .title-group { display: flex; flex-direction: column; }
        .label { font-size: 9px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1.5px; }
        .status { font-size: 11px; color: #94a3b8; margin-top: 2px; font-family: monospace; }

        .run-btn {
            background-color: var(--accent);
            color: #1e1b4b;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }

        .run-btn:hover { transform: scale(1.03); filter: brightness(1.1); }
        .run-btn:disabled { background-color: #475569; cursor: not-allowed; opacity: 0.6; }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #editor {
            flex: 1;
            background-color: #1a1b26;
            color: #c0caf5;
            padding: 15px;
            font-family: 'Cascadia Code', 'Consolas', monospace;
            font-size: 14px;
            border: none;
            outline: none;
            resize: none;
            line-height: 1.5;
        }

        .terminal-container {
            height: 160px;
            background-color: var(--terminal-bg);
            border-top: 1px solid #334155;
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background-color: #111827;
            padding: 6px 15px;
            font-size: 10px;
            font-weight: bold;
            color: #64748b;
            text-transform: uppercase;
        }

        #console {
            flex: 1;
            padding: 10px 15px;
            margin: 0;
            font-family: 'Consolas', monospace;
            font-size: 13px;
            color: var(--green);
            overflow-y: auto;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-group">
            <div class="label">ConsDev Lab v2.1</div>
            <div class="status" id="fileStatus">Iniciando sistema...</div>
        </div>
        <button id="runBtn" class="run-btn">
            <span>EJECUTAR</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </button>
    </div>

    <div class="main-container">
        <textarea id="editor" spellcheck="false" placeholder="// Cargando código fuente..."></textarea>
        
        <div class="terminal-container">
            <div class="terminal-header">Consola de Salida</div>
            <pre id="console">Listo para compilar.</pre>
        </div>
    </div>

    <script>
        const editor = document.getElementById('editor');
        const consoleOut = document.getElementById('console');
        const runBtn = document.getElementById('runBtn');
        const statusLabel = document.getElementById('fileStatus');

        // Obtener parámetros de la URL
        const params = new URLSearchParams(window.location.search);
        const sourceFile = params.get('file');

        async function fetchSource() {
            if (!sourceFile) {
                editor.value = "// Error: No se proporcionó ninguna URL de archivo.\n// Uso: compilerc.html?file=URL_DEL_ARCHIVO_RAW";
                statusLabel.innerText = "⚠️ Falta parámetro 'file'";
                statusLabel.style.color = "#f87171";
                return;
            }

            try {
                const fileName = sourceFile.split('/').pop();
                statusLabel.innerText = "Cargando: " + fileName;
                
                const response = await fetch(sourceFile + '?t=' + Date.now());
                if (!response.ok) throw new Error('Error de red');
                
                const text = await response.text();
                // Limpiar editor antes de asignar para evitar duplicidad visual
                editor.value = ""; 
                editor.value = text;
                
                statusLabel.innerText = "● " + fileName + " sincronizado";
                statusLabel.style.color = "#4ade80";
            } catch (error) {
                editor.value = "// Error al cargar archivo externo.\n// Verifica la conexión o el enlace Raw.";
                statusLabel.innerText = "⚠️ Error de sincronización";
                statusLabel.style.color = "#f87171";
            }
        }

        runBtn.addEventListener('click', async () => {
            runBtn.disabled = true;
            consoleOut.innerText = 'Compilando...';
            consoleOut.style.color = "#94a3b8";

            try {
                const response = await fetch('https://wandbox.org/api/compile.json', {
                    method: 'POST',
                    body: JSON.stringify({
                        code: editor.value,
                        compiler: 'gcc-head',
                        save: false
                    })
                });

                const data = await response.json();
                
                if (data.program_output) {
                    consoleOut.innerText = data.program_output;
                    consoleOut.style.color = "#4ade80";
                } else if (data.compiler_error) {
                    consoleOut.innerText = "ERROR DE COMPILACIÓN:\n\n" + data.compiler_error;
                    consoleOut.style.color = "#f87171";
                } else {
                    consoleOut.innerText = "Proceso finalizado sin salida.";
                }
            } catch (error) {
                consoleOut.innerText = "Error: No se pudo contactar al compilador.";
            } finally {
                runBtn.disabled = false;
            }
        });

        // Soporte para Tab
        editor.addEventListener('keydown', function(e) {
            if (e.key === 'Tab') {
                e.preventDefault();
                const s = this.selectionStart;
                this.value = this.value.substring(0, s) + "    " + this.value.substring(this.selectionEnd);
                this.selectionEnd = s + 4;
            }
        });

        fetchSource();
    </script>
</body>
</html>
