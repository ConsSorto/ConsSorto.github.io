<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

.site-header {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    padding: 10px 0 !important; /* Reducimos el espacio arriba y abajo del logo */
    border-bottom: none !important; /* Adiós a la línea de arriba */
    min-height: auto !important; /* Permitimos que el tamaño del logo defina la altura */
  }
  
  /* Usamos un selector más específico para romper bloqueos del tema */
  .site-header .site-title {
    background-image: url("/assets/logo-consdev.png") !important;
    background-size: contain !important; 
    background-repeat: no-repeat !important;
    background-position: center !important;
    height: 250px !important; /* Aumento significativo de altura */
    width: 100% !important; /* Que use todo el ancho disponible */
    min-width: 320px !important; /* Forzamos un ancho mínimo para que no se encoja en el sidebar */
    max-width: 550px !important; /* Límite máximo para que no se descontrole */
    display: block !important;
    text-indent: -9999px; /* Ocultamos el texto del título para que solo se vea el logo */
    transition: none !important; /* Evita que la plantilla aplique efectos de escala al hacer clic */
    margin: 0 auto !important;
  }

  
  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }
/* --- 3. Botón Zen con Icono --- */
  #toggle-nav {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    width: 45px;
    height: 45px;
    background: #BB86FC;
    color: #000;
    border: none;
    border-radius: 50%; /* Circular */
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  #toggle-nav:hover { transform: scale(1.1); background: #03DAC6; }

  /* --- 4. Lógica de Ocultar Menú --- */
  body.hide-menu .side-bar { display: none !important; }
  body.hide-menu .main { margin-left: 0 !important; max-width: 100% !important; }
  body.hide-menu .main-header { left: 0 !important; width: 100% !important; }

  /* --- 5. Estilo para el Logo del Footer --- */
  .footer-logo {
    width: 60px;
    opacity: 0.5;
    filter: grayscale(100%);
    transition: 0.3s;
    margin-bottom: 10px;
  }
  .footer-logo:hover { opacity: 1; filter: grayscale(0%); }

  /* --- 4. Limpieza del Índice (TOC) --- */
  h2.text-delta, h2.text-delta + ul, hr {
    display: none !important;
  }
 </style>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.querySelector('.search-input');
    if (searchInput) {
      searchInput.placeholder = "Buscar...";
    }
  });
</script>
<button id="toggle-nav" onclick="document.body.classList.toggle('hide-menu')" title="Modo Enfoque">
  🖥️
</button>
