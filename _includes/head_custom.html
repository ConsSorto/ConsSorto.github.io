<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

.site-header {
    display: flex !important;
    flex-direction: column !important;
    align-items: center !important;
    padding: 0 !important; /* Eliminamos el padding que generaba espacio extra */
    border-bottom: none !important;
    height: auto !important; /* Permite que el contenedor crezca con el logo */
    min-height: 0 !important;
  }
  
  .site-header .site-title {
    display: block !important;
    width: 100% !important;
    max-width: 100% !important; 
    margin: 0 !important; /* Eliminamos márgenes para pegar el logo a los bordes */
    padding: 0 !important;
    transition: none !important;
  }

  .site-logo {
    width: 100% !important; 
    height: 200px !important; /* Tamaño grande pero más equilibrado */
    min-height: 200px !important;
    display: block !important;
  }

  /* Aseguramos que la imagen inyectada por la plantilla respete el tamaño */
  .site-logo img, .site-title img {
    height: 200px !important;
    max-height: 200px !important;
    width: auto !important;
    display: block !important;
    margin: 0 auto !important;
    object-fit: contain; /* Mantiene la proporción sin deformar */
  }
  
  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }
/* --- 3. Botón Zen con Icono --- */
  #toggle-nav {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    width: 45px;
    height: 45px;
    background: #BB86FC;
    color: #000;
    border: none;
    border-radius: 50%; /* Circular */
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  #toggle-nav:hover { transform: scale(1.1); background: #03DAC6; }

  /* --- 4. Lógica de Ocultar Menú --- */
  body.hide-menu .side-bar { display: none !important; }
  body.hide-menu .main { margin-left: 0 !important; max-width: 100% !important; }
  body.hide-menu .main-header { left: 0 !important; width: 100% !important; }

  /* --- 5. Estilo para el Logo del Footer --- */
  .footer-logo {
    width: 60px;
    opacity: 0.5;
    filter: grayscale(100%);
    transition: 0.3s;
    margin-bottom: 10px;
  }
  .footer-logo:hover { opacity: 1; filter: grayscale(0%); }

  /* --- 4. Limpieza del Índice (TOC) --- */
  h2.text-delta, h2.text-delta + ul, hr {
    display: none !important;
  }
 </style>
<script>
  document.addEventListener("DOMContentLoaded", function() {
    const searchInput = document.querySelector('.search-input');
    if (searchInput) {
      searchInput.placeholder = "Buscar...";
    }
  });
</script>
<button id="toggle-nav" onclick="document.body.classList.toggle('hide-menu')" title="Modo Enfoque">
  🖥️
</button>
