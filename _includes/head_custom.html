<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

 .site-header {
    padding-top: 30px !important;
    padding-bottom: 40px !important; /* Aumentamos esto para separar el logo de la línea */
    border-bottom: 1px solid #333 !important; /* La línea divisoria */
  }
  
  .site-title {
    background-image: url("/assets/logo-consdev.png") !important;
    background-size: contain !important;
    background-repeat: no-repeat !important;
    background-position: center !important;
    height: 120px !important; /* Tamaño Pro */
    width: 100% !important;
    display: block !important;
    text-indent: -9999px; /* Ocultamos el texto del título para que solo se vea el logo */
  }

  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }
/* --- 3. Botón Zen con Icono --- */
  #toggle-nav {
    position: fixed;
    top: 15px;
    right: 15px;
    z-index: 9999;
    width: 45px;
    height: 45px;
    background: #BB86FC;
    color: #000;
    border: none;
    border-radius: 50%; /* Circular */
    font-size: 20px;
    cursor: pointer;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
  }
  #toggle-nav:hover { transform: scale(1.1); background: #03DAC6; }

  /* --- 4. Lógica de Ocultar Menú --- */
  body.hide-menu .side-bar { display: none !important; }
  body.hide-menu .main { margin-left: 0 !important; max-width: 100% !important; }
  body.hide-menu .main-header { left: 0 !important; width: 100% !important; }

  /* --- 5. Estilo para el Logo del Footer --- */
  .footer-logo {
    width: 60px;
    opacity: 0.5;
    filter: grayscale(100%);
    transition: 0.3s;
    margin-bottom: 10px;
  }
  .footer-logo:hover { opacity: 1; filter: grayscale(0%); }

 /* 1. Oculta el encabezado "Table of contents" */
  h2.text-delta {
    display: none !important;
  }

  /* 2. Oculta la lista (ul) que sigue inmediatamente al encabezado */
  h2.text-delta + ul {
    display: none !important;
  }

  /* 3. Oculta las líneas divisorias (hr) que suelen rodear al índice */
  hr + h2.text-delta, 
  h2.text-delta + ul + hr {
    display: none !important;
  }
  
  main hr:nth-last-of-type(1), 
  main hr:nth-last-of-type(2) {
    display: none !important;
  }
  /* --- 2. Traducir el Buscador (Truco CSS) --- */
  .search-input::placeholder {
    color: transparent !important; /* Escondemos el "Search ConsDev" original */
  }
  .search-label::after {
    content: "Buscar en ConsDev..."; /* Tu texto en español */
    position: absolute;
    left: 40px;
    top: 11px;
    font-size: 14px;
    color: #888;
    pointer-events: none; /* Para que el clic pase al input */
  }


 </style>

<button id="toggle-nav" onclick="document.body.classList.toggle('hide-menu')" title="Modo Enfoque">
  🖥️
</button>
