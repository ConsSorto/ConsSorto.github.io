<style>
  /* 1. Justificar todo el texto del contenido */
  .main-content p, .main-content li {
    text-align: justify;
    hyphens: auto; /* Ayuda a que las palabras no dejen huecos grandes */
  }

  /* 2. Centrar TODAS las imágenes del blog automáticamente */
  .main-content img {
    display: block;
    margin: 2rem auto; /* Las centra y les da aire arriba y abajo */
    max-width: 85%;    /* Evita que se desborden */
    border-radius: 8px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4); /* Sombrita pro */
  }

/* 3. Centrar diagramas Mermaid (Ajustado para tu estructura real) */
  /* Targeteamos el 'pre' que contiene el código de mermaid */
  .main-content pre:has(code.language-mermaid),
  .main-content pre.mermaid,
  .main-content .mermaid {
    display: flex !important;
    justify-content: center !important;
    background-color: transparent !important; /* Quita el fondo gris de bloque de código */
    border: none !important;
    padding: 0 !important;
    overflow-x: visible !important; /* Evita scrolls innecesarios */
  }

  /* Aseguramos que el SVG interno sea un bloque centrado */
  code.language-mermaid svg {
    margin: 0 auto !important;
    display: block !important;
  }
  
  /* Ajuste para que los títulos no se justifiquen (se ven mal) */
  h1, h2, h3, h4 {
    text-align: left;
  }
/* --- 2. Estilos para el Logo --- */
  .site-logo { max-height: 60px; margin-bottom: 10px; }

  /* --- 3. Botón para ocultar Nav (Zen Mode) --- */
  #zen-toggle {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 999;
    background: #BB86FC; /* El color lila de tus diagramas */
    color: #121212;
    border: none;
    border-radius: 50%;
    width: 50px;
    height: 50px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    transition: transform 0.3s;
  }

  #zen-toggle:hover { transform: scale(1.1); }

  /* Clase que oculta el nav y expande el contenido */
  .nav-hidden .side-bar { display: none !important; }
  .nav-hidden .main { margin-left: 0 !important; max-width: 100% !important; }
</style>

<button id="zen-toggle" title="Alternar modo pantalla completa">
  <span id="zen-icon">👁️</span>
</button>

<script>
  document.addEventListener('DOMContentLoaded', function() {
    const btn = document.getElementById('zen-toggle');
    const body = document.body;
    const icon = document.getElementById('zen-icon');

    btn.addEventListener('click', function() {
      body.classList.toggle('nav-hidden');
      if (body.classList.contains('nav-hidden')) {
        icon.innerText = '📁'; // Icono para volver a mostrar
      } else {
        icon.innerText = '👁️'; // Icono para ocultar
      }
    });
  });
</script>
