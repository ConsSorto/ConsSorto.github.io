<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

  /* --- 2. Centrado de Mermaid (El Fix Definitivo) --- */
  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }

/* 3. El Botón Simple */
  #toggle-nav {
    position: fixed;
    top: 10px;
    right: 10px;
    z-index: 9999;
    padding: 8px 12px;
    background: #BB86FC;
    color: #000;
    border: none;
    border-radius: 4px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    opacity: 0.6;
  }
  #toggle-nav:hover { opacity: 1; }

  /* 4. La Lógica de Ocultar */
  body.hide-menu .side-bar { display: none !important; }
  body.hide-menu .main { margin-left: 0 !important; max-width: 100% !important; }
  body.hide-menu .main-header { left: 0 !important; width: 100% !important; }
</style>

<button id="toggle-nav" onclick="document.body.classList.toggle('hide-menu')">
  MODO LECTURA
</button>
