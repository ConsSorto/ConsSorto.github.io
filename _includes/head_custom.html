<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

  /* --- 2. Centrado de Mermaid (El Fix Definitivo) --- */
  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }

  /* --- 3. Zen Mode (Ocultar Nav) --- */
  #zen-toggle {
    position: fixed; bottom: 20px; right: 20px; z-index: 10000;
    background: #BB86FC; color: #121212; border: none; border-radius: 50%;
    width: 50px; height: 50px; cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; transition: all 0.3s ease;
  }

  /* AQUÍ ESTÁ EL TRUCO: Forzamos el ancho del contenido al ocultar el Nav */
  body.nav-hidden .side-bar { display: none !important; }
  body.nav-hidden .main { 
    margin-left: 0 !important; 
    max-width: 100% !important; 
    width: 100% !important; 
  }
  body.nav-hidden .main-header { left: 0 !important; width: 100% !important; }

  /* Ajuste para el Logo en el sidebar */
  .site-logo { max-height: 80px; margin: 0 auto 1rem; display: block; }
</style>

<button id="zen-toggle" aria-label="Modo Pantalla Completa">
  <span id="zen-icon">👁️</span>
</button>

<script>
  // Usamos una función autoejecutable para no ensuciar el scope global
  (function() {
    function initZenMode() {
      const btn = document.getElementById('zen-toggle');
      const icon = document.getElementById('zen-icon');
      if (!btn) return;

      btn.addEventListener('click', function() {
        document.body.classList.toggle('nav-hidden');
        const isHidden = document.body.classList.contains('nav-hidden');
        icon.innerText = isHidden ? '📁' : '👁️';
        
        // Disparamos un resize para que Mermaid se re-ajuste al nuevo ancho
        window.dispatchEvent(new Event('resize'));
      });
    }

    // Esperamos a que todo cargue
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initZenMode);
    } else {
      initZenMode();
    }
  })();
</script>
