<style>
  /* --- 1. Justificado y Estética de Imágenes --- */
  .main-content p, .main-content li { text-align: justify; hyphens: auto; }
  .main-content img { display: block; margin: 2rem auto; max-width: 85%; border-radius: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
  h1, h2, h3, h4 { text-align: left; }

  /* --- 2. Centrado de Mermaid (El Fix Definitivo) --- */
  /* Forzamos al contenedor de Mermaid a ser un bloque centrado */
  code.language-mermaid { 
    display: block !important; 
    text-align: center !important; 
    background: transparent !important;
    padding: 0 !important;
  }
  code.language-mermaid svg { 
    display: inline-block !important; 
    margin: 0 auto !important; 
  }
  /* Limpiamos el formato de 'pre' que el tema le pone por error */
  pre:has(code.language-mermaid) { 
    background: transparent !important; 
    border: none !important; 
    display: block !important;
    width: 100% !important;
  }

/* 3. Estilos del Botón Zen (Inyectado por JS) */
  #zen-toggle {
    position: fixed; bottom: 25px; right: 25px; z-index: 10000;
    background: #BB86FC; color: #121212; border: none; border-radius: 50%;
    width: 55px; height: 55px; cursor: pointer;
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; transition: transform 0.2s;
  }
  #zen-toggle:active { transform: scale(0.9); }

  /* 4. Lógica de Ocultar Nav (Para Just the Docs) */
  body.nav-hidden .side-bar { display: none !important; }
  body.nav-hidden .main { margin-left: 0 !important; width: 100% !important; max-width: 100% !important; }
  body.nav-hidden .main-header { left: 0 !important; width: 100% !important; }
</style>

<script>
  (function() {
    // Esta función fabrica el botón y lo mete al final del body
    function injectZenButton() {
      if (document.getElementById('zen-toggle')) return;

      const btn = document.createElement('button');
      btn.id = 'zen-toggle';
      btn.innerHTML = '<span id="zen-icon">👁️</span>';
      btn.title = "Modo Enfoque (Ocultar Menú)";
      document.body.appendChild(btn);

      btn.addEventListener('click', function() {
        document.body.classList.toggle('nav-hidden');
        const icon = document.getElementById('zen-icon');
        const isHidden = document.body.classList.contains('nav-hidden');
        icon.innerText = isHidden ? '📁' : '👁️';
        
        // Forzamos a Mermaid a re-dibujarse al nuevo ancho
        window.dispatchEvent(new Event('resize'));
      });
    }

    // Esperamos a que el DOM esté listo para inyectar
    if (document.readyState === 'complete' || document.readyState === 'interactive') {
      injectZenButton();
    } else {
      document.addEventListener('DOMContentLoaded', injectZenButton);
    }
  })();
</script>
